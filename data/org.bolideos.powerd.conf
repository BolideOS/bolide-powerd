<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="org.bolideos.powerd"/>
  </policy>
  <policy context="default">
    <allow send_destination="org.bolideos.powerd"/>
    <allow send_interface="org.bolideos.powerd.ProfileManager"/>
  </policy>
</busconfig>
